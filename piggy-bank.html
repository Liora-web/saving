<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="粉紅存錢筒">
<title>粉紅存錢筒</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --pk1:#FFF0F5;--pk2:#FFD6E7;--pk3:#FFB3CE;--pk4:#FF85AA;--pk5:#E8527A;
    --pk-text:#8B2252;--pk-muted:#C4698A;
    --green:#2D7A5F;--red:#C0392B;
    --card-bg:#FFFBFD;
  }
  html,body{height:100%;background:#FFF8FB;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;-webkit-tap-highlight-color:transparent;}
  #app{max-width:430px;margin:0 auto;padding:16px 16px 40px;}

  .header{text-align:center;padding:24px 0 18px;}
  .pig-wrap{width:76px;height:76px;border-radius:50%;background:#FFD6E7;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:38px;border:2px solid #FFB3CE;}
  .header h1{font-size:21px;font-weight:600;color:var(--pk-text);}
  .header p{font-size:13px;color:var(--pk-muted);margin-top:4px;}

  .balance-card{background:#FFD6E7;border-radius:22px;padding:24px 20px;margin-bottom:14px;text-align:center;border:1.5px solid #FFB3CE;}
  .balance-label{font-size:13px;color:var(--pk-muted);margin-bottom:6px;}
  .balance-amount{font-size:40px;font-weight:600;color:var(--pk-text);letter-spacing:-1px;}
  .balance-change{font-size:13px;margin-top:6px;color:var(--pk-muted);}
  .balance-change.up{color:var(--green);}
  .balance-change.down{color:var(--red);}

  .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .stat-card{background:var(--card-bg);border-radius:14px;padding:14px;border:1px solid #FFD6E7;text-align:center;}
  .stat-label{font-size:12px;color:var(--pk-muted);margin-bottom:4px;}
  .stat-value{font-size:18px;font-weight:600;}
  .stat-value.green{color:var(--green);}
  .stat-value.red{color:var(--red);}

  .month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card-bg);border-radius:14px;padding:10px 16px;margin-bottom:12px;border:1px solid #FFD6E7;}
  .month-btn{background:none;border:none;cursor:pointer;color:var(--pk-muted);font-size:22px;padding:4px 10px;border-radius:10px;line-height:1;}
  .month-btn:active{background:#FFD6E7;}
  .month-label{font-size:16px;font-weight:600;color:var(--pk-text);}

  .month-overview{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
  .overview-card{background:var(--card-bg);border-radius:12px;padding:12px 8px;border:1px solid #FFD6E7;text-align:center;}
  .overview-label{font-size:11px;color:var(--pk-muted);margin-bottom:4px;}
  .overview-value{font-size:14px;font-weight:600;}
  .overview-value.green{color:var(--green);}
  .overview-value.red{color:var(--red);}
  .overview-value.pink{color:var(--pk-text);}

  .form-card{background:var(--card-bg);border:1px solid #FFD6E7;border-radius:18px;padding:18px;margin-bottom:14px;}
  .section-title{font-size:13px;font-weight:600;color:var(--pk-muted);margin-bottom:12px;letter-spacing:0.3px;}

  .type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .type-btn{padding:11px;border-radius:12px;border:1px solid #FFD6E7;background:transparent;font-size:14px;font-weight:600;cursor:pointer;color:var(--pk-muted);transition:all 0.15s;}
  .type-btn:active{opacity:0.8;}
  .type-btn.active-in{background:#E8F8F2;border-color:#A8D8C4;color:var(--green);}
  .type-btn.active-out{background:#FFE8ED;border-color:#FFB3CE;color:var(--red);}

  .input-row{display:flex;gap:8px;margin-bottom:10px;}
  .input-group{flex:1;display:flex;flex-direction:column;gap:5px;}
  .input-label{font-size:12px;color:var(--pk-muted);}
  input[type="number"],input[type="text"],input[type="date"],select{
    width:100%;padding:10px 12px;border-radius:11px;border:1px solid #FFD6E7;
    background:#FFF4F8;font-size:15px;color:var(--pk-text);font-family:inherit;outline:none;
    -webkit-appearance:none;appearance:none;
  }
  input:focus,select:focus{border-color:#FF85AA;background:#FFF8FB;}
  .submit-btn{width:100%;padding:13px;border-radius:13px;border:none;background:#FF85AA;color:#fff;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:0.5px;}
  .submit-btn:active{background:#E8527A;}

  .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .filter-bar{display:flex;gap:6px;}
  .filter-btn{padding:5px 14px;border-radius:20px;border:1px solid #FFD6E7;background:transparent;font-size:13px;cursor:pointer;color:var(--pk-muted);}
  .filter-btn:active{opacity:0.7;}
  .filter-btn.active{background:#FFD6E7;color:var(--pk-text);border-color:#FFB3CE;}

  .records-list{display:flex;flex-direction:column;gap:9px;}
  .record-item{background:var(--card-bg);border:1px solid #FFD6E7;border-radius:15px;padding:13px 15px;display:flex;align-items:center;gap:12px;}
  .record-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .record-dot.in{background:#E8F8F2;}
  .record-dot.out{background:#FFE8ED;}
  .record-info{flex:1;min-width:0;}
  .record-desc{font-size:14px;font-weight:600;color:var(--pk-text);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .record-date{font-size:12px;color:var(--pk-muted);}
  .record-right{text-align:right;flex-shrink:0;}
  .record-amount{font-size:16px;font-weight:600;}
  .record-amount.in{color:var(--green);}
  .record-amount.out{color:var(--red);}
  .record-balance-after{font-size:11px;color:var(--pk-muted);}
  .delete-btn{background:none;border:none;color:var(--pk-muted);cursor:pointer;padding:6px;font-size:15px;border-radius:8px;opacity:0.45;flex-shrink:0;}
  .delete-btn:active{opacity:1;color:var(--red);}

  .empty-state{text-align:center;padding:40px 20px;color:var(--pk-muted);font-size:14px;}
  .empty-icon{font-size:40px;margin-bottom:12px;display:block;}
  .deco{text-align:center;font-size:11px;color:var(--pk-muted);margin:6px 0 10px;letter-spacing:3px;opacity:0.5;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="pig-wrap">🐷</div>
    <h1>我的粉紅存錢筒</h1>
    <p>記錄每一分存下來的心意 🌸</p>
  </div>

  <div class="balance-card">
    <div class="balance-label">💰 總餘額</div>
    <div class="balance-amount" id="total-balance">NT$ 0</div>
    <div class="balance-change" id="last-change"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">🌿 累計存入</div>
      <div class="stat-value green" id="total-in-all">NT$ 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">🌷 累計提出</div>
      <div class="stat-value red" id="total-out-all">NT$ 0</div>
    </div>
  </div>

  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="month-label"></span>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>

  <div class="month-overview">
    <div class="overview-card">
      <div class="overview-label">本月存入</div>
      <div class="overview-value green" id="month-in">NT$ 0</div>
    </div>
    <div class="overview-card">
      <div class="overview-label">本月提出</div>
      <div class="overview-value red" id="month-out">NT$ 0</div>
    </div>
    <div class="overview-card">
      <div class="overview-label">本月結餘</div>
      <div class="overview-value pink" id="month-net">NT$ 0</div>
    </div>
  </div>

  <div class="form-card">
    <div class="section-title">✨ 新增紀錄</div>
    <div class="type-toggle">
      <button class="type-btn active-in" id="btn-in" onclick="setType('in')">🌿 存入</button>
      <button class="type-btn" id="btn-out" onclick="setType('out')">🌷 提出</button>
    </div>
    <div class="input-row">
      <div class="input-group">
        <div class="input-label">金額（元）</div>
        <input type="number" id="input-amount" placeholder="0" min="1" inputmode="numeric" />
      </div>
      <div class="input-group">
        <div class="input-label">日期</div>
        <input type="date" id="input-date" />
      </div>
    </div>
    <div class="input-group" style="margin-bottom:14px;">
      <div class="input-label">說明（選填）</div>
      <input type="text" id="input-desc" placeholder="例如：零錢、生日紅包…" />
    </div>
    <button class="submit-btn" onclick="addRecord()">新增紀錄 🎀</button>
  </div>

  <div class="deco">· · ·</div>

  <div class="list-header">
    <div class="section-title" style="margin:0;">本月紀錄</div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('in',this)">存入</button>
      <button class="filter-btn" onclick="setFilter('out',this)">提出</button>
    </div>
  </div>

  <div class="records-list" id="records-list"></div>
</div>

<script>
const STORAGE_KEY='piggy_pink_v1';
let records=[];
let currentFilter='all';
let viewYear=new Date().getFullYear();
let viewMonth=new Date().getMonth();
let currentType='in';

function load(){try{const r=localStorage.getItem(STORAGE_KEY);records=r?JSON.parse(r):[];}catch(e){records=[];}}
function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(records));}catch(e){}}
function fmt(n){return 'NT$ '+Math.abs(Math.round(n)).toLocaleString('zh-TW');}
function fmtShort(n){return Math.abs(Math.round(n)).toLocaleString('zh-TW');}

function setType(t){
  currentType=t;
  document.getElementById('btn-in').className='type-btn'+(t==='in'?' active-in':'');
  document.getElementById('btn-out').className='type-btn'+(t==='out'?' active-out':'');
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function changeMonth(d){
  viewMonth+=d;
  if(viewMonth>11){viewMonth=0;viewYear++;}
  if(viewMonth<0){viewMonth=11;viewYear--;}
  render();
}

function addRecord(){
  const amount=parseFloat(document.getElementById('input-amount').value);
  const date=document.getElementById('input-date').value;
  const desc=document.getElementById('input-desc').value.trim()||(currentType==='in'?'存入':'提出');
  if(!amount||amount<=0){document.getElementById('input-amount').focus();return;}
  if(!date){document.getElementById('input-date').focus();return;}
  records.unshift({id:Date.now(),type:currentType,amount,date,desc});
  save();
  document.getElementById('input-amount').value='';
  document.getElementById('input-desc').value='';
  render();
}

function deleteRecord(id){
  if(!confirm('確定要刪除這筆紀錄嗎？'))return;
  records=records.filter(r=>r.id!==id);
  save();
  render();
}

function getMonthRecords(){
  return records.filter(r=>{
    const d=new Date(r.date);
    return d.getFullYear()===viewYear&&d.getMonth()===viewMonth;
  });
}

function computeRunningBalance(targetId){
  let bal=0;
  const sorted=[...records].sort((a,b)=>new Date(a.date)-new Date(b.date)||a.id-b.id);
  for(const r of sorted){
    bal+=r.type==='in'?r.amount:-r.amount;
    if(r.id===targetId)return bal;
  }
  return 0;
}

function render(){
  const totalIn=records.filter(r=>r.type==='in').reduce((s,r)=>s+r.amount,0);
  const totalOut=records.filter(r=>r.type==='out').reduce((s,r)=>s+r.amount,0);
  const balance=totalIn-totalOut;
  document.getElementById('total-balance').textContent=fmt(balance);
  document.getElementById('total-in-all').textContent=fmt(totalIn);
  document.getElementById('total-out-all').textContent=fmt(totalOut);

  if(records.length>0){
    const last=records[0];
    const el=document.getElementById('last-change');
    el.textContent='上次'+(last.type==='in'?'存入':'提出')+' '+(last.type==='in'?'+':'-')+fmtShort(last.amount)+' 元';
    el.className='balance-change '+(last.type==='in'?'up':'down');
  }else{
    document.getElementById('last-change').textContent='';
  }

  const tw=['一','二','三','四','五','六','七','八','九','十','十一','十二'];
  document.getElementById('month-label').textContent=viewYear+' 年 '+tw[viewMonth]+'月';

  const mr=getMonthRecords();
  const mIn=mr.filter(r=>r.type==='in').reduce((s,r)=>s+r.amount,0);
  const mOut=mr.filter(r=>r.type==='out').reduce((s,r)=>s+r.amount,0);
  const mNet=mIn-mOut;
  document.getElementById('month-in').textContent=fmt(mIn);
  document.getElementById('month-out').textContent=fmt(mOut);
  const netEl=document.getElementById('month-net');
  netEl.textContent=fmt(mNet);
  netEl.className='overview-value '+(mNet>=0?'green':'red');

  renderList();
}

function renderList(){
  const list=document.getElementById('records-list');
  const mr=getMonthRecords();
  const filtered=currentFilter==='all'?mr:mr.filter(r=>r.type===currentFilter);

  if(filtered.length===0){
    list.innerHTML='<div class="empty-state"><span class="empty-icon">🌸</span>'+(records.length===0?'還沒有紀錄，快存第一筆吧！':'這個月還沒有紀錄喔')+'</div>';
    return;
  }

  list.innerHTML=filtered.map(r=>{
    const bal=computeRunningBalance(r.id);
    const dateStr=r.date.replace(/-/g,'/');
    const icon=r.type==='in'?'🌿':'🌷';
    const sign=r.type==='in'?'+':'-';
    return '<div class="record-item">'+
      '<div class="record-dot '+r.type+'">'+icon+'</div>'+
      '<div class="record-info">'+
        '<div class="record-desc">'+r.desc+'</div>'+
        '<div class="record-date">'+dateStr+'</div>'+
      '</div>'+
      '<div class="record-right">'+
        '<div class="record-amount '+r.type+'">'+sign+fmtShort(r.amount)+'</div>'+
        '<div class="record-balance-after">餘額 '+fmtShort(bal)+'</div>'+
      '</div>'+
      '<button class="delete-btn" onclick="deleteRecord('+r.id+')">✕</button>'+
    '</div>';
  }).join('');
}

load();
document.getElementById('input-date').valueAsDate=new Date();
render();
</script>
</body>
</html>
